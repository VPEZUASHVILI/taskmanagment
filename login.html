<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <title>შესვლა - Asana Lite</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-container">
    <div class="login-card shadow-lg">
        <div class="text-center mb-4">
            <div class="login-icon-wrapper mb-3">
                <i class="bi bi-shield-lock-fill text-primary"></i>
            </div>
            <h2 class="fw-bold mb-1">Asana Lite</h2>
            <p class="text-muted small">მართეთ თქვენი დავალებები ეფექტურად</p>
        </div>
        <form action="/auth/login" method="POST">
            <div class="mb-3">
                <label class="form-label small fw-semibold text-secondary">მომხმარებელი</label>
                <div class="input-group">
                    <span class="input-group-text bg-light border-end-0"><i class="bi bi-person"></i></span>
                    <input type="text" name="username" class="form-control bg-light border-start-0" placeholder="admin" required>
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label small fw-semibold text-secondary">პაროლი</label>
                <div class="input-group">
                    <span class="input-group-text bg-light border-end-0"><i class="bi bi-key"></i></span>
                    <input type="password" name="password" class="form-control bg-light border-start-0" placeholder="••••••••" required>
                </div>
            </div>
            <div class="mb-4 d-flex justify-content-between align-items-center">
                <div class="form-check">
                    <input type="checkbox" class="form-check-input" id="rememberMe">
                    <label class="form-check-label small text-muted" for="rememberMe">დამიმახსოვრე</label>
                </div>
            </div>
            <button type="submit" class="btn btn-primary w-100 py-2 fw-bold shadow-sm">
                შესვლა <i class="bi bi-arrow-right-short ms-1"></i>
            </button>
        </form>
        <div class="text-center mt-4">
            <p class="small text-muted mb-0">© 2024 Asana Lite Team</p>
        </div>
    </div>
</body>
</html>
