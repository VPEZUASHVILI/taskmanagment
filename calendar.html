<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <title>კალენდარი - Asana Lite</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>
    <link rel="stylesheet" href="style.css">
    <style>
        #calendar { 
            background: var(--bs-body-bg); 
            padding: 25px; 
            border-radius: 12px; 
            border: 1px solid var(--bs-border-color);
            box-shadow: 0 10px 30px rgba(0,0,0,0.03); 
        }
        .fc-event { 
            cursor: pointer; 
            border-radius: 6px !important;
            font-size: 0.85rem;
            padding: 3px 8px;
            font-weight: 500;
            margin-top: 2px;
            transition: transform 0.1s ease;
        }
        .fc-event:hover { transform: scale(1.02); }
        [data-bs-theme="dark"] .fc-theme-standard td, [data-bs-theme="dark"] .fc-theme-standard th { border-color: #374151; }
        .fc .fc-toolbar-title { font-weight: 700; color: var(--bs-emphasis-color); font-size: 1.4rem; }
        .fc .fc-button-primary { 
            background-color: transparent !important; 
            border: 1px solid var(--bs-border-color) !important; 
            color: var(--bs-body-color) !important;
            text-transform: capitalize;
            font-weight: 500;
        }
        .fc .fc-button-primary:hover { background-color: var(--bs-tertiary-bg) !important; }
        .fc .fc-button-active { background-color: var(--bs-primary) !important; color: white !important; border-color: var(--bs-primary) !important; }
        .fc-day-today { background: rgba(99, 102, 241, 0.03) !important; }
        .fc .fc-daygrid-day-number { 
            font-weight: 600; 
            padding: 10px; 
            color: var(--bs-secondary-color);
        }
        /* Microsoft Style Today Circle */
        .fc-day-today .fc-daygrid-day-number {
            background: var(--bs-primary);
            color: white !important;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 5px;
        }
    </style>
</head>
<body data-page="calendar">
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4 shadow-sm">
        <div class="container-fluid px-4">
            <button class="btn btn-link text-white me-2 p-0 border-0 shadow-none" onclick="toggleSidebar()" title="მენიუს გადართვა">
                <i class="bi bi-list fs-3"></i>
            </button>
            <a class="navbar-brand fw-bold" href="#">📊 Asana Lite</a>
            <div class="d-flex align-items-center">
                <div class="position-relative me-4" style="cursor: pointer;" data-bs-toggle="modal" data-bs-target="#notificationModal">
                    <i class="bi bi-bell-fill text-white fs-4"></i>
                    <span id="notificationBadge" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger d-none">0</span>
                </div>
                <div class="form-check form-switch text-white me-4">
                    <input class="form-check-input" type="checkbox" id="darkModeToggle" onclick="toggleDarkMode()">
                </div>
                <a href="/auth/logout" class="btn btn-outline-light btn-sm">გამოსვლა</a>
            </div>
        </div>
    </nav>

    <div class="container-fluid px-2 main-content">
        <div class="row mt-4">
            <div id="sidebarColumn" class="col-md-2 col-lg-1 mb-4">
                <div class="d-grid gap-2 sticky-top" style="top: 20px;">
                    <button class="btn btn-success shadow-sm py-2 sidebar-btn px-1" data-bs-toggle="modal" data-bs-target="#addTaskModal">
                        <i class="bi bi-plus-circle d-block mb-1 fs-6"></i> <span style="font-size: 0.7rem;">დამატება</span>
                    </button>
                    <a href="/" class="btn btn-outline-primary shadow-sm py-2 sidebar-btn px-1">
                        <i class="bi bi-house-door d-block mb-1 fs-6"></i> <span style="font-size: 0.7rem;">მთავარი</span>
                    </a>
                    <a href="/kanban" class="btn btn-outline-warning shadow-sm py-2 sidebar-btn px-1">
                        <i class="bi bi-columns-gap d-block mb-1 fs-6"></i> <span style="font-size: 0.7rem;">კანბანი</span>
                    </a>
                    <a href="/calendar" class="btn btn-info shadow-sm py-2 sidebar-btn active px-1">
                        <i class="bi bi-calendar3 d-block mb-1 fs-6"></i> <span style="font-size: 0.7rem;">კალენდარი</span>
                    </a>
                    <a href="/stats" class="btn btn-outline-secondary shadow-sm py-2 sidebar-btn px-1">
                        <i class="bi bi-bar-chart d-block mb-1 fs-6"></i> <span style="font-size: 0.7rem;">სტატისტიკა</span>
                    </a>
                </div>
            </div>
            <div id="contentColumn" class="col-md-10 col-lg-11">
                <h3 class="mb-4 text-secondary fw-light">დედლაინების კალენდარი</h3>
                <div id="calendar"></div>
            </div>
        </div>
    </div>

    <!-- დავალების დამატების მოდალი -->
    <div class="modal fade" id="addTaskModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header bg-success text-white">
                    <h5 class="modal-title">ახალი დავალების დამატება</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="taskForm">
                        <div class="mb-3"><label class="form-label fw-bold">დავალების აღწერა</label><input type="text" id="taskTitle" class="form-control" required></div>
                        <div class="mb-3"><label class="form-label fw-bold">დამკვეთი</label><input type="text" id="taskClient" class="form-control"></div>
                        <div class="row">
                            <div class="col-md-6 mb-3"><label class="form-label fw-bold">დედლაინი</label><input type="date" id="taskDeadline" class="form-control" required></div>
                            <div class="col-md-6 mb-3"><label class="form-label fw-bold">პრიორიტეტი</label>
                                <select id="taskPriority" class="form-select"><option value="Low">დაბალი</option><option value="Medium" selected>საშუალო</option><option value="High">მაღალი</option></select>
                            </div>
                        </div>
                        <div class="mb-3"><label class="form-label fw-bold">შემსრულებელი</label><select id="taskAssignee" class="form-select"></select></div>
                        <div class="mb-3"><label class="form-label fw-bold">ფაილები</label><input type="file" id="taskFiles" class="form-control" multiple></div>
                        <div class="d-flex gap-2"><button type="button" class="btn btn-secondary w-50" data-bs-dismiss="modal">გაუქმება</button><button type="submit" class="btn btn-success w-50">შექმნა</button></div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- რედაქტირების მოდალი -->
    <div class="modal fade" id="editTaskModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header"><h5 class="modal-title">დავალების რედაქტირება</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
                <div class="modal-body">
                    <form id="editTaskForm">
                        <input type="hidden" id="editTaskId">
                        <div class="mb-3"><label class="form-label">დავალების აღწერა</label><input type="text" id="editTaskTitle" class="form-control" required></div>
                        <div class="mb-3"><label class="form-label">დედლაინი</label><input type="date" id="editTaskDeadline" class="form-control" required></div>
                        <div class="mb-3"><label class="form-label">დამკვეთი</label><input type="text" id="editTaskClient" class="form-control"></div>
                        <div class="mb-3"><label class="form-label">საჭიროებები</label><textarea id="editTaskRequirements" class="form-control" rows="2"></textarea></div>
                        <div class="mb-3"><label class="form-label">კომენტარი</label><textarea id="editTaskComment" class="form-control" rows="2"></textarea></div>
                        <div class="mb-3"><label class="form-label">პრიორიტეტი</label>
                            <select id="editTaskPriority" class="form-select"><option value="Low">დაბალი</option><option value="Medium">საშუალო</option><option value="High">მაღალი</option></select>
                        </div>
                        <div class="mb-3"><label class="form-label">შემსრულებელი</label><select id="editTaskAssignee" class="form-select"></select></div>
                        <div class="mb-3"><label class="form-label">დაამატეთ ფაილები</label><input type="file" id="editTaskFiles" class="form-control" multiple></div>
                        <button type="submit" class="btn btn-primary w-100">ცვლილებების შენახვა</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- ნოტიფიკაციების მოდალი -->
    <div class="modal fade" id="notificationModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header"><h5 class="modal-title">შეტყობინებების ისტორია</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
                <div class="modal-body p-0"><div id="notificationList" class="list-group list-group-flush"></div></div>
                <div class="modal-footer"><button type="button" class="btn btn-sm btn-outline-secondary" onclick="clearNotifications()">გასუფთავება</button></div>
            </div>
        </div>
    </div>

    <!-- შეხსენების მოდალი -->
    <div class="modal fade" id="setReminderModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-sm">
            <div class="modal-content">
                <div class="modal-header bg-primary text-white"><h6 class="modal-title">შეხსენება</h6><button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button></div>
                <div class="modal-body">
                    <div class="mb-2"><label class="form-label small fw-bold">თარიღი:</label><input type="date" id="reminderDate" class="form-control form-control-sm"></div>
                    <div class="mb-3"><label class="form-label small fw-bold">საათი:</label><select id="reminderHour" class="form-select form-select-sm"></select></div>
                    <button type="button" class="btn btn-primary btn-sm w-100" onclick="saveTaskReminder()">დაყენება</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
